<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GasBack, Page Not Found</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container section" style="min-height: 100vh; display: grid; place-items: center;">
    <div class="glass-card" style="padding: 32px; max-width: 720px; width: 100%; text-align: center;">
      <span class="eyebrow">404</span>
      <h1 style="margin-top: 0; font-size: 56px; letter-spacing: -0.05em;">This page drifted off-chain.</h1>
      <p style="color: var(--muted); line-height: 1.7;">The page you are looking for does not exist, or the route is not available on this MVP build.</p>
      <a href="index.html" class="btn btn-primary" style="display: inline-block; margin-top: 18px;">Back to homepage</a>
    </div>
  </main>
</body>
</html>
